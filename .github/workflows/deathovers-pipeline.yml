name: DeathOvers Pipeline

on:
  repository_dispatch:
    types: [match_data_ready]

concurrency:
  group: deathovers-pipeline
  cancel-in-progress: false

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so rebasing works perfectly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run CrewAI agents (via Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MATCH_DATA_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python app.py

      - name: Commit and push article
        run: |
          git config user.name "DeathOvers Bot"
          git config user.email "deathovers.ai@gmail.com"
          
          # Stage ONLY the newly generated markdown posts
          git add src/content/posts/*.md
          
          # Stash the new files safely in memory for a moment
          git stash
          
          # Pull down any changes that happened while the AI was thinking
          git pull origin main --rebase
          
          # Pop your newly generated articles back into the folder
          git stash pop || echo "No stashed files found"
          
          # Re-stage them for the final commit
          git add src/content/posts/*.md
          
          # Commit and push back to GitHub (adds [skip ci] so the bot doesn't trigger itself)
          git diff-index --quiet HEAD || git commit -m "DeathOvers Pipeline: Deployed Tactical Asset [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
