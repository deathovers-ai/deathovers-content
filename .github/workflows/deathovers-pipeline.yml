- name: Run CrewAI agents
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MATCH_DATA: ${{ toJson(github.event.client_payload) }}
        run: |
          python app.py
